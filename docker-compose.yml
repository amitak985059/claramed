version: '3.9'

services:
  backend:
    build: ./backend
    container_name: claramed_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:4000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: claramed_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  admin:
    build: ./admin
    container_name: claramed_admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

networks:
  default:
    name: claramed_network
